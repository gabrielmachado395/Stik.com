        <button class="menu-toggle" aria-label="Abrir Menu">

        </button>
        <div class="header-logo">
            <a href="index.html">
                <img src="img/Logos/logo.png" alt="Logo STIK" decoding="async" fetchpriority="high">
            </a>
        </div>
    </div>
    <div class="header-right">        
        <div class="search-container">
            <button class="icon-btn search-toggle" aria-label="Pesquisar">

        </div>
