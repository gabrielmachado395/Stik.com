<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categoria</title>
  <link rel="stylesheet" href="stylesheet/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
</head>
<body>
  <div id="header-placeholder"></div>
  <div id="sidebar-placeholder"></div>
  <div id="overlay"></div>

  <main class="main-content">
    <section class="category-page">
      <header class="category-hero animate-on-scroll" id="categoria-hero">
        <div class="category-hero-overlay">
          <h1 id="categoria-title">Categoria</h1>
        </div>
      </header>

      <div class="category-shell animate-on-scroll">
        <nav class="category-breadcrumb" aria-label="Breadcrumb">
          <a href="index.html">Home</a>
          <span>/</span>
          <a href="index.html#catalogo">Cat&aacute;logo</a>
          <span>/</span>
          <span id="categoria-breadcrumb-current" aria-current="page">Categoria</span>
        </nav>

        <section class="category-results" aria-labelledby="categoria-title">
          <div class="category-toolbar">
            <p id="categoria-count" class="category-count">0 produtos encontrados</p>

            <div class="category-sort" role="group" aria-labelledby="categoria-sort-label">
              <span id="categoria-sort-label">Ordenar</span>
              <details class="category-sort-dropdown" id="categoria-sort-dropdown">
                <summary
                  class="category-sort-trigger"
                  id="categoria-sort-trigger"
                  aria-labelledby="categoria-sort-label categoria-sort-current"
                >
                  <span id="categoria-sort-current">Relev&acirc;ncia</span>
                </summary>
                <select id="categoria-sort" name="categoria-sort" class="category-sort-native" tabindex="-1" aria-hidden="true">
                  <option value="relevance">Relev&acirc;ncia</option>
                  <option value="name-asc">Nome A-Z</option>
                  <option value="name-desc">Nome Z-A</option>
                </select>
                <div class="category-sort-menu" id="categoria-sort-menu" role="listbox" aria-labelledby="categoria-sort-label"></div>
              </details>
            </div>
          </div>

          <div id="categoria-container" class="category-grid">
            <!-- cards dos produtos da categoria -->
          </div>

          <div class="category-actions">
            <button type="button" id="categoria-show-more" class="category-show-more" hidden>Mostrar mais</button>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div id="catalogo-placeholder"></div>
  <div id="footer-placeholder"></div>

  <script src="stylesheet/script.js"></script>
</body>
</html>
