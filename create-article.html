<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Artigo - Stik</title>
    <link rel="stylesheet" href="stylesheet/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <div id="sidebar-placeholder"></div>
    <div id="overlay"></div>

    <main class="create-main blog-editor-page">
        <section class="blog-editor-shell">
            <nav class="blog-breadcrumb blog-editor-breadcrumb" aria-label="Caminho da página">
                <a href="index.html">Home</a>
                <a href="blog.html">Blog</a>
                <span>Novo artigo</span>
            </nav>

            <header class="blog-editor-header">
                <div>
                    <span>Editor do blog</span>
                    <h1>Novo artigo</h1>
                </div>
                <div class="blog-editor-actions">
                    <button type="button" class="blog-editor-btn blog-editor-btn-light" data-editor-action="preview">
                        <i class="fas fa-eye"></i>
                        Visualizar
                    </button>
                    <button type="button" class="blog-editor-btn blog-editor-btn-outline" data-editor-action="draft">
                        <i class="fas fa-save"></i>
                        Salvar rascunho
                    </button>
                    <button type="submit" form="article-form" class="blog-editor-btn blog-editor-btn-primary">
                        <i class="fas fa-paper-plane"></i>
                        Publicar
                    </button>
                </div>
            </header>

            <form id="article-form" class="blog-editor-layout blog-editor-layout-simple">
                <div class="blog-editor-main">
                    <section class="blog-editor-panel blog-editor-cover">
                        <div class="blog-editor-panel-head">
                            <h2>Imagem de capa</h2>
                            <button type="button" class="blog-icon-btn" aria-label="Trocar imagem de capa">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>

                        <div class="blog-cover-editor">
                            <figure class="is-empty" aria-label="Nenhuma imagem de capa selecionada"></figure>
                            <div class="blog-cover-fields">
                                <div class="blog-cover-actions">
                                    <button type="button" class="blog-editor-btn blog-editor-btn-light" id="cover-upload-btn">
                                        <i class="fas fa-upload"></i>
                                        Enviar imagem
                                    </button>
                                    <button type="button" class="blog-editor-btn blog-editor-btn-light" id="cover-library-btn">
                                        <i class="fas fa-images"></i>
                                        Biblioteca
                                    </button>
                                    <input type="file" id="cover-file-input" accept="image/*" hidden>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="blog-editor-panel blog-editor-identity">
                        <div class="blog-editor-panel-head">
                            <h2>Dados principais</h2>
                            <span id="article-status-pill">Rascunho</span>
                        </div>

                        <div class="blog-field-grid">
                            <label class="blog-field blog-field-wide" for="article-title">
                                <span>Título</span>
                                <textarea id="article-title" name="titulo" rows="2" placeholder="Digite o título do artigo" required></textarea>
                            </label>

                            <label class="blog-field blog-field-wide" for="article-summary">
                                <span>Resumo</span>
                                <textarea id="article-summary" name="resumo" rows="3" placeholder="Escreva um resumo curto para o card do blog"></textarea>
                            </label>
                        </div>
                    </section>

                    <section class="blog-editor-panel blog-word-panel">
                        <div class="blog-editor-panel-head">
                            <h2>Conteúdo</h2>
                            <span>Editor livre</span>
                        </div>

                        <div class="blog-word-editor">
                            <div class="blog-word-toolbar" aria-label="Ferramentas de edição">
                                <select id="article-format-select" aria-label="Formato do texto">
                                    <option value="p">Parágrafo</option>
                                    <option value="h2">Título de seção</option>
                                    <option value="h3">Subtítulo</option>
                                </select>
                                <button type="button" data-editor-command="bold" aria-label="Negrito">
                                    <i class="fas fa-bold"></i>
                                </button>
                                <button type="button" data-editor-command="italic" aria-label="Itálico">
                                    <i class="fas fa-italic"></i>
                                </button>
                                <button type="button" data-editor-command="insertUnorderedList" aria-label="Lista">
                                    <i class="fas fa-list-ul"></i>
                                </button>
                                <button type="button" data-editor-command="createLink" aria-label="Inserir link">
                                    <i class="fas fa-link"></i>
                                </button>
                                <button type="button" data-editor-command="insertImage" aria-label="Inserir imagem">
                                    <i class="fas fa-image"></i>
                                </button>
                            </div>

                            <div id="article-free-content" class="blog-word-canvas" contenteditable="true"></div>
                            <input type="file" id="article-inline-image-input" accept="image/*" hidden>
                        </div>
                    </section>
                </div>

                <aside class="blog-editor-sidebar blog-editor-sidebar-simple">
                    <section class="blog-editor-panel blog-tag-panel">
                        <h2>Tags</h2>
                        <div id="selected-tags" class="blog-selected-tags"></div>
                        <div class="blog-tag-entry">
                            <input type="text" id="tag-input" placeholder="Nova tag">
                            <button type="button" id="add-tag-btn" aria-label="Adicionar tag"><i class="fas fa-plus"></i></button>
                        </div>
                        <div id="available-tags" class="blog-available-tags" aria-label="Tags disponíveis">
                            <button type="button" data-tag="Moda">Moda</button>
                            <button type="button" data-tag="Lançamentos">Lançamentos</button>
                            <button type="button" data-tag="Negócios">Negócios</button>
                            <button type="button" data-tag="Consumidor">Consumidor</button>
                        </div>
                    </section>
                </aside>
            </form>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="stylesheet/blogApi.js"></script>
    <script src="stylesheet/script.js"></script>
</body>
</html>
